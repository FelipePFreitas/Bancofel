# URL de conexao (Adicionado parametros para criar o banco automaticamente)
spring.datasource.url=${BD_CONEXAO}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracoes do Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Dialeto atualizado para versoes modernas do Spring Boot / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuracoes de Documentacao e Aplicacao
springdoc.override-with-generic-response=false
spring.application.name=bancofel
